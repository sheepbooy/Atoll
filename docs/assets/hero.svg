<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="Atoll  floating approval island for coding agents">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="45%" stop-color="#111317"/>
      <stop offset="100%" stop-color="#0d1218"/>
    </linearGradient>
    <linearGradient id="glow-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDD8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#6FD8FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#38BDD8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#12151a"/>
    </linearGradient>
    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="420" fill="url(#bg)"/>
  <ellipse cx="600" cy="210" rx="420" ry="160" fill="url(#glow-cyan)" opacity="0.55"/>
  <ellipse cx="220" cy="80" rx="180" ry="120" fill="#FF8175" opacity="0.08"/>
  <ellipse cx="980" cy="320" rx="200" ry="140" fill="#B2EA7E" opacity="0.07"/>

  <!-- macOS menu bar hint -->
  <rect x="0" y="0" width="1200" height="28" fill="#000000" opacity="0.55"/>
  <circle cx="24" cy="14" r="5" fill="#FF5F57"/>
  <circle cx="44" cy="14" r="5" fill="#FEBC2E"/>
  <circle cx="64" cy="14" r="5" fill="#28C840"/>

  <!-- notch -->
  <path d="M520 0 H680 Q700 0 700 20 V28 H520 Z" fill="#000000" opacity="0.75"/>

  <!-- floating island capsule -->
  <g transform="translate(430, 8)">
    <rect x="0" y="0" width="340" height="36" rx="18" fill="url(#pill)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <rect x="0" y="0" width="340" height="36" rx="18" fill="rgba(255,255,255,0.03)"/>

    <!-- mascot -->
    <g transform="translate(14, 4) scale(0.42)">
      <rect x="8" y="18" width="48" height="26" fill="#38BDD8"/>
      <rect x="8" y="18" width="48" height="5" fill="#5FD8EC"/>
      <rect x="20" y="44" width="6" height="12" fill="#2A8FA8"/>
      <rect x="38" y="44" width="6" height="12" fill="#2A8FA8"/>
      <rect x="18" y="24" width="11" height="11" rx="2" fill="#1a1a1a"/>
      <rect x="35" y="24" width="11" height="11" rx="2" fill="#1a1a1a"/>
    </g>

    <circle cx="58" cy="18" r="4" fill="#6FE0A4"/>
    <rect x="72" y="14" width="52" height="8" rx="4" fill="rgba(255,255,255,0.08)"/>
    <circle cx="150" cy="18" r="10" fill="#e8765a"/>
    <circle cx="176" cy="18" r="10" fill="#61d8f7"/>
    <circle cx="202" cy="18" r="10" fill="#b2e578"/>
    <rect x="228" y="12" width="96" height="12" rx="6" fill="rgba(255,129,117,0.22)" stroke="rgba(255,129,117,0.35)"/>
    <text x="276" y="21" text-anchor="middle" fill="#ffcbc5" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="600">1 pending</text>
  </g>

  <!-- title block -->
  <text x="600" y="170" text-anchor="middle" fill="#f7f4ee" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.5">Atoll</text>
  <text x="600" y="215" text-anchor="middle" fill="#b7b4ac" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="500">Floating approval island for local coding agents</text>
  <text x="600" y="252" text-anchor="middle" fill="#8d8a82" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Approve Claude Code permissions from your macOS menu bar  no context switch.</text>

  <!-- feature pills -->
  <g font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">
    <rect x="248" y="290" width="148" height="34" rx="17" fill="rgba(111,220,255,0.12)" stroke="rgba(111,220,255,0.28)"/>
    <text x="322" y="312" text-anchor="middle" fill="#6fdcff">Notch-hugging UI</text>

    <rect x="412" y="290" width="148" height="34" rx="17" fill="rgba(178,234,126,0.12)" stroke="rgba(178,234,126,0.28)"/>
    <text x="486" y="312" text-anchor="middle" fill="#b2ea7e">100% local</text>

    <rect x="576" y="290" width="168" height="34" rx="17" fill="rgba(255,129,117,0.12)" stroke="rgba(255,129,117,0.28)"/>
    <text x="660" y="312" text-anchor="middle" fill="#ff8175">Claude Code hooks</text>

    <rect x="760" y="290" width="192" height="34" rx="17" fill="rgba(205,193,255,0.12)" stroke="rgba(205,193,255,0.28)"/>
    <text x="856" y="312" text-anchor="middle" fill="#cdc1ff">Token usage tracking</text>
  </g>

  <!-- expanded panel preview -->
  <g transform="translate(330, 340)" filter="url(#soft-glow)">
    <rect x="0" y="0" width="540" height="64" rx="16" fill="rgba(20,22,26,0.92)" stroke="rgba(255,255,255,0.1)"/>
    <rect x="16" y="16" width="72" height="10" rx="5" fill="rgba(255,255,255,0.1)"/>
    <rect x="16" y="34" width="320" height="14" rx="7" fill="rgba(255,255,255,0.06)"/>
    <rect x="360" y="18" width="72" height="28" rx="14" fill="rgba(158,233,184,0.18)" stroke="rgba(158,233,184,0.45)"/>
    <text x="396" y="37" text-anchor="middle" fill="#9ee9b8" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Approve</text>
    <rect x="444" y="18" width="72" height="28" rx="14" fill="rgba(120,46,41,0.45)" stroke="rgba(255,129,117,0.22)"/>
    <text x="480" y="37" text-anchor="middle" fill="#ffcbc5" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700">Deny</text>
  </g>
</svg>
