<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-label="Atoll architecture  Claude Code hooks to local bridge to floating island">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#6fdcff"/>
    </marker>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#16181d"/>
      <stop offset="100%" stop-color="#111317"/>
    </linearGradient>
  </defs>
  <rect width="960" height="360" fill="#0a0b0d"/>
  <text x="480" y="42" text-anchor="middle" fill="#f7f4ee" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700">How Atoll works</text>
  <text x="480" y="68" text-anchor="middle" fill="#8d8a82" font-family="Inter, system-ui, sans-serif" font-size="14">Everything stays on your Mac  127.0.0.1:47777</text>

  <!-- Claude Code -->
  <rect x="40" y="110" width="200" height="150" rx="16" fill="url(#card)" stroke="rgba(255,129,117,0.35)"/>
  <text x="140" y="145" text-anchor="middle" fill="#ff8175" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="700">Claude Code</text>
  <text x="140" y="175" text-anchor="middle" fill="#b7b4ac" font-family="Inter, system-ui, sans-serif" font-size="12">PermissionRequest</text>
  <text x="140" y="195" text-anchor="middle" fill="#b7b4ac" font-family="Inter, system-ui, sans-serif" font-size="12">PostToolUse / Stop</text>
  <text x="140" y="230" text-anchor="middle" fill="#6d6b64" font-family="Inter, system-ui, sans-serif" font-size="11">~/.claude/settings.json</text>

  <!-- Hook shim -->
  <rect x="300" y="130" width="180" height="110" rx="16" fill="url(#card)" stroke="rgba(111,220,255,0.35)"/>
  <text x="390" y="168" text-anchor="middle" fill="#6fdcff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Hook shim</text>
  <text x="390" y="195" text-anchor="middle" fill="#b7b4ac" font-family="Inter, system-ui, sans-serif" font-size="11">atoll-claude-hook.mjs</text>
  <text x="390" y="215" text-anchor="middle" fill="#6d6b64" font-family="Inter, system-ui, sans-serif" font-size="10">bundled in app</text>

  <!-- Bridge -->
  <rect x="540" y="110" width="180" height="150" rx="16" fill="url(#card)" stroke="rgba(178,234,126,0.35)"/>
  <text x="630" y="145" text-anchor="middle" fill="#b2ea7e" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Hook bridge</text>
  <text x="630" y="175" text-anchor="middle" fill="#b7b4ac" font-family="Inter, system-ui, sans-serif" font-size="12">Rust HTTP server</text>
  <text x="630" y="200" text-anchor="middle" fill="#9ee9b8" font-family="ui-monospace, monospace" font-size="12">127.0.0.1:47777</text>
  <text x="630" y="230" text-anchor="middle" fill="#6d6b64" font-family="Inter, system-ui, sans-serif" font-size="11">token + session state</text>

  <!-- Island UI -->
  <rect x="780" y="90" width="160" height="190" rx="20" fill="url(#card)" stroke="rgba(205,193,255,0.35)"/>
  <text x="860" y="125" text-anchor="middle" fill="#cdc1ff" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700">Floating island</text>
  <rect x="810" y="145" width="100" height="18" rx="9" fill="rgba(255,255,255,0.08)"/>
  <rect x="810" y="175" width="100" height="40" rx="10" fill="rgba(255,255,255,0.05)"/>
  <rect x="815" y="225" width="40" height="18" rx="9" fill="rgba(158,233,184,0.25)"/>
  <rect x="862" y="225" width="40" height="18" rx="9" fill="rgba(120,46,41,0.45)"/>
  <text x="860" y="265" text-anchor="middle" fill="#6d6b64" font-family="Inter, system-ui, sans-serif" font-size="10">React + Tauri</text>

  <line x1="240" y1="185" x2="300" y2="185" stroke="#6fdcff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="480" y1="185" x2="540" y2="185" stroke="#6fdcff" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="720" y1="185" x2="780" y2="185" stroke="#6fdcff" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="200" y="300" width="560" height="36" rx="18" fill="rgba(111,220,255,0.08)" stroke="rgba(111,220,255,0.2)"/>
  <text x="480" y="323" text-anchor="middle" fill="#6fdcff" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600">No cloud · No telemetry · One-click hook install from the tray menu</text>
</svg>
