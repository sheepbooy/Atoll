<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cursor Cube — 像素形象预览</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 40px 24px 56px;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124, 95, 212, 0.2), transparent),
        #0a0b0d;
      color: #e8eaed;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    header { max-width: 720px; margin: 0 auto 36px; text-align: center; }
    .eyebrow {
      margin: 0 0 8px;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(167, 139, 250, 0.75);
    }
    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 650;
      letter-spacing: -0.02em;
    }
    .subtitle {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: rgba(232, 234, 237, 0.62);
    }
    .hero {
      max-width: 960px;
      margin: 0 auto 40px;
      text-align: center;
    }
    .hero-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 240px;
      padding: 24px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(167, 139, 250, 0.14);
    }
    .hero-caption {
      margin: 12px 0 0;
      font-size: 13px;
      color: rgba(232, 234, 237, 0.55);
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 16px;
      max-width: 960px;
      margin: 0 auto;
    }
    .card {
      padding: 16px 12px 14px;
      text-align: center;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .card-stage {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 140px;
      margin-bottom: 10px;
    }
    .card-label {
      margin: 0 0 4px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(196, 181, 253, 0.95);
    }
    .card-hint {
      margin: 0;
      font-size: 11px;
      line-height: 1.45;
      color: rgba(232, 234, 237, 0.45);
    }
    footer {
      max-width: 960px;
      margin: 36px auto 0;
      text-align: center;
      font: 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace;
      color: rgba(232, 234, 237, 0.28);
    }

    .cursor-mascot {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 0;
    }
    .cursor-mascot-svg { overflow: visible; }
    .cursor-mascot .cursor-mascot-svg {
      filter:
        drop-shadow(0 0 1px var(--glow-inner))
        drop-shadow(0 0 6px var(--glow-outer));
    }
    .cursor-mascot.is-calm .cursor-mascot-figure { animation: float 2.8s ease-in-out infinite; }
    .cursor-mascot.is-sleeping .cursor-mascot-figure { animation: float-slow 3.6s ease-in-out infinite; }
    .cursor-mascot.is-alert .cursor-mascot-figure { animation: alert-hop 0.85s ease-in-out infinite; }
    .cursor-mascot.is-happy .cursor-mascot-figure { animation: bounce 0.6s ease-in-out infinite; }
    .cursor-mascot.is-worried .cursor-mascot-figure { animation: tremble 0.5s ease-in-out infinite; }
    .cursor-mascot.is-sad { transform: translateY(8%); }
    .cursor-mascot-star { opacity: 0; }
    .cursor-mascot-star-0 { animation: twinkle 1.2s ease-in-out infinite; }
    .cursor-mascot-star-1 { animation: twinkle 1.2s ease-in-out infinite 0.4s; }
    .cursor-mascot-star-2 { animation: twinkle 1.2s ease-in-out infinite 0.8s; }
    .cursor-mascot-heart { animation: heart-rise 1.8s ease-out infinite; }
    .cursor-mascot-z { opacity: 0; }
    .cursor-mascot-z-0 { animation: zzz-rise 2.4s ease-in-out infinite; }
    .cursor-mascot-z-1 { animation: zzz-rise 2.4s ease-in-out infinite 0.5s; }
    .cursor-mascot-z-2 { animation: zzz-rise 2.4s ease-in-out infinite 1s; }
    .cursor-mascot-sweat { animation: sweat-fall 1.3s ease-in-out infinite; }
    .cursor-mascot-bang { animation: bang-pop 0.7s ease-in-out infinite; }

    @keyframes float { 0%, 100% { transform: translateY(6%); } 50% { transform: translateY(-6%); } }
    @keyframes float-slow { 0%, 100% { transform: translateY(2%); } 50% { transform: translateY(9%); } }
    @keyframes alert-hop { 0%, 100% { transform: translateY(0); } 30% { transform: translateY(-13%); } 60% { transform: translateY(0); } }
    @keyframes bounce { 0%, 100% { transform: translateY(9%) scale(1); } 40% { transform: translateY(-16%) scale(1.04); } 70% { transform: translateY(0) scale(0.99); } }
    @keyframes tremble { 0%, 100% { transform: translate(-3%, 2%); } 50% { transform: translate(3%, 2%); } }
    @keyframes twinkle { 0%, 100% { opacity: 0; transform: scale(0.3); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes heart-rise { 0% { opacity: 0; transform: translateY(10%) scale(0.6); } 25% { opacity: 1; } 100% { opacity: 0; transform: translateY(-45%) scale(1.1); } }
    @keyframes zzz-rise { 0% { opacity: 0; transform: translate(0, 10%); } 40% { opacity: 1; } 100% { opacity: 0; transform: translate(30%, -70%); } }
    @keyframes sweat-fall { 0% { opacity: 0; transform: translateY(-40%); } 30% { opacity: 1; } 100% { opacity: 0; transform: translateY(160%); } }
    @keyframes bang-pop { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-14%) scale(1.14); } }
  </style>
</head>
<body>
  <header>
    <p class="eyebrow">Atoll Agent Mascot</p>
    <h1>Cursor Cube</h1>
    <p class="subtitle">等距立方体 · 左脸表情 · 品牌凹槽 · 七种 mood</p>
  </header>

  <section class="hero">
    <div class="hero-stage" id="hero"></div>
    <p class="hero-caption">calm — 默认态（带眨眼动画）</p>
  </section>

  <div class="grid" id="grid"></div>

  <footer>accent #a78bfa · accentDark #7c5fd4 · 双击本文件即可离线查看</footer>

  <script>
    const EYE = "#1a1a1a";
    const EYE_W = 5;
    const EYE_H = 11;
    const EYE_H_WIDE = 12;
    const EYE_BLINK_W = 8;
    const EYE_BLINK_H = 2;
    const VIEWBOX = { x: -20, y: -34, w: 152, h: 136 };
    const ASPECT = VIEWBOX.w / VIEWBOX.h;
    const CUBE_SCALE = 1.58;
    const ANCHOR = { x: 60, y: 38 };
    const CUBE_TRANSFORM = `translate(${ANCHOR.x} ${ANCHOR.y}) scale(${CUBE_SCALE}) translate(${-ANCHOR.x} ${-ANCHOR.y})`;
    const ACCENT = "#a78bfa";
    const ACCENT_DARK = "#7c5fd4";

    const CUBE = {
      top: "32,18 60,4 88,18 60,32",
      left: "32,18 60,32 60,68 32,54",
      front: "60,32 88,18 88,54 60,68",
      facet: "88,18 74,28 88,42",
      groove: { x1: 74, y1: 28, x2: 64, y2: 60 },
    };

    const MOODS = [
      { mood: "calm", hint: "空闲 · 悬浮呼吸" },
      { mood: "alert", hint: "待审批 · 弹跳 + !!" },
      { mood: "happy", hint: "完成 · 星心特效" },
      { mood: "worried", hint: "异常 · 发绿 + 汗" },
      { mood: "sad", hint: "低落 · 垂眉下沉" },
      { mood: "sleeping", hint: "休眠 · zzz" },
      { mood: "dead", hint: "离线 · 灰化" },
    ];

    function parseHex(hex) {
      const v = Number.parseInt(hex.replace("#", ""), 16);
      if (Number.isNaN(v)) return null;
      return [(v >> 16) & 255, (v >> 8) & 255, v & 255];
    }

    function mixHex(a, b, w) {
      const left = parseHex(a);
      const right = parseHex(b);
      if (!left || !right) return a;
      const mix = (l, r) => Math.round(l * (1 - w) + r * w);
      const rgb = [mix(left[0], right[0]), mix(left[1], right[1]), mix(left[2], right[2])];
      return "#" + rgb.map((c) => c.toString(16).padStart(2, "0")).join("");
    }

    function defaultPalette() {
      return {
        top: "#ede9fe", left: "#c4b5fd", front: "#8b6fd8", facet: "#ddd6fe",
        groove: "#6d4fc9", outline: "#b8a4f8", blush: "#f0e8ff", sparkle: "#f5f3ff",
        sweat: "#c4b5fd",
        glowInner: "rgba(196, 181, 253, 0.75)",
        glowOuter: "rgba(124, 95, 212, 0.28)",
      };
    }

    function derivePalette(accent, accentDark) {
      const dark = accentDark || mixHex(accent, "#000000", 0.35);
      const rgb = parseHex(accent);
      return {
        top: mixHex(accent, "#ffffff", 0.42),
        left: mixHex(accent, "#ffffff", 0.18),
        front: dark,
        facet: mixHex(accent, "#ffffff", 0.55),
        groove: mixHex(dark, "#000000", 0.28),
        outline: mixHex(accent, "#ffffff", 0.35),
        blush: mixHex(accent, "#ffffff", 0.45),
        sparkle: mixHex(accent, "#ffffff", 0.62),
        sweat: mixHex(accent, "#ffffff", 0.35),
        glowInner: rgb ? `rgba(${Math.min(rgb[0]+40,255)}, ${Math.min(rgb[1]+40,255)}, ${Math.min(rgb[2]+40,255)}, 0.75)` : "rgba(196, 181, 253, 0.75)",
        glowOuter: rgb ? `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.28)` : "rgba(124, 95, 212, 0.28)",
      };
    }

    function paletteFor(mood) {
      if (mood === "dead") {
        return {
          top: "#a4a8ac", left: "#909498", front: "#787c80", facet: "#b0b4b8",
          groove: "#585c60", outline: "#9aa0a4", blush: "#b0b4b8", sparkle: "#c8ccd0",
          sweat: "#a0a4a8",
          glowInner: "rgba(140, 148, 152, 0.45)",
          glowOuter: "rgba(80, 88, 92, 0.28)",
        };
      }
      if (mood === "worried") {
        const base = defaultPalette();
        return {
          ...base,
          top: "#7cb97c",
          left: mixHex("#7cb97c", "#ffffff", 0.15),
          front: "#4a8a4a",
          facet: mixHex("#7cb97c", "#ffffff", 0.35),
          groove: mixHex("#4a8a4a", "#000000", 0.2),
          outline: mixHex("#7cb97c", "#ffffff", 0.25),
          blush: "#d4f5d4",
          sparkle: "#e8ffe8",
          sweat: "#a8d8a8",
          glowInner: "rgba(212, 245, 212, 0.75)",
          glowOuter: "rgba(124, 185, 124, 0.28)",
        };
      }
      return derivePalette(ACCENT, ACCENT_DARK);
    }

    /** Centered on cube, slightly above vertical midpoint (left / front faces). */
    const FLOATING_EYES = [{ x: 47, y: 33 }, { x: 73, y: 33 }];
    const FLOATING_MOUTH = { x: 60, y: 39 };

    function eyePair() {
      return FLOATING_EYES;
    }

    function eyeFloatPad(x, y) {
      return `<ellipse cx="${x}" cy="${y + 0.5}" rx="4.8" ry="6.8" fill="rgba(255,255,255,0.2)"/>`;
    }

    function wrapEye(x, y, inner) {
      return `<g class="cursor-mascot-eye-float">${eyeFloatPad(x, y)}${inner}</g>`;
    }

    function verticalEye(x, y, w = EYE_W, h = EYE_H, fill = EYE) {
      return `<rect x="${x - w / 2}" y="${y - h / 2}" width="${w}" height="${h}" fill="${fill}"/>`;
    }

    function blinkEye(x, y) {
      return `<rect x="${x - EYE_BLINK_W / 2}" y="${y - EYE_BLINK_H / 2}" width="${EYE_BLINK_W}" height="${EYE_BLINK_H}" fill="${EYE}"/>`;
    }

    function sleepEye(x, y) {
      return blinkEye(x, y);
    }

    function happyEye(x, y) {
      return blinkEye(x, y);
    }

    function deadEye(x, y) {
      return `
        <line x1="${x - 4.5}" y1="${y - 5.5}" x2="${x + 4.5}" y2="${y + 5.5}" stroke="#e8eaed" stroke-width="2.8" stroke-linecap="round"/>
        <line x1="${x + 4.5}" y1="${y - 5.5}" x2="${x - 4.5}" y2="${y + 5.5}" stroke="#e8eaed" stroke-width="2.8" stroke-linecap="round"/>`;
    }

    function brow(x, y, tilt, index) {
      const by = y - EYE_H / 2 - 5;
      const w = 7;
      const angle = tilt === "sad" ? (index === 0 ? -18 : 18) : index === 0 ? 18 : -18;
      return `<rect x="${x - w / 2}" y="${by}" width="${w}" height="2" fill="${EYE}" rx="0.4" transform="rotate(${angle} ${x} ${by})"/>`;
    }

    function face(p) {
      return `
        <polygon points="${CUBE.left}" fill="${p.left}" stroke="${p.outline}" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="${CUBE.front}" fill="${p.front}" stroke="${p.outline}" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="${CUBE.top}" fill="${p.top}" stroke="${p.outline}" stroke-width="2" stroke-linejoin="round"/>
        <polygon points="${CUBE.facet}" fill="${p.facet}" stroke="${p.outline}" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="${CUBE.groove.x1}" y1="${CUBE.groove.y1}" x2="${CUBE.groove.x2}" y2="${CUBE.groove.y2}"
          stroke="${p.groove}" stroke-width="2.4" stroke-linecap="round"/>
      `;
    }

    function renderExpression(mood, blinking) {
      const [left, right] = eyePair();

      if (mood === "dead") {
        return wrapEye(left.x, left.y, deadEye(left.x, left.y))
          + wrapEye(right.x, right.y, deadEye(right.x, right.y));
      }

      if (mood === "happy") {
        const mouth = FLOATING_MOUTH;
        return `<g class="cursor-mascot-eyes">
          ${wrapEye(left.x, left.y, happyEye(left.x, left.y))}
          ${wrapEye(right.x, right.y, happyEye(right.x, right.y))}
          <rect x="${mouth.x - 4}" y="${mouth.y}" width="8" height="2" fill="${EYE}" rx="0.5" opacity="0.85"/>
        </g>`;
      }

      if (mood === "sleeping") {
        return `<g class="cursor-mascot-eyes">
          ${wrapEye(left.x, left.y, sleepEye(left.x, left.y))}
          ${wrapEye(right.x, right.y, sleepEye(right.x, right.y))}
        </g>`;
      }

      if (mood === "worried") {
        return `<g class="cursor-mascot-eyes">
          ${wrapEye(left.x, left.y, verticalEye(left.x, left.y) + brow(left.x, left.y, "worried", 0))}
          ${wrapEye(right.x, right.y, verticalEye(right.x, right.y) + brow(right.x, right.y, "worried", 1))}
        </g>`;
      }

      if (mood === "sad") {
        return `<g class="cursor-mascot-eyes">
          ${wrapEye(left.x, left.y, verticalEye(left.x, left.y) + brow(left.x, left.y, "sad", 0))}
          ${wrapEye(right.x, right.y, verticalEye(right.x, right.y) + brow(right.x, right.y, "sad", 1))}
        </g>`;
      }

      const draw = (pt) =>
        blinking ? blinkEye(pt.x, pt.y) : verticalEye(pt.x, pt.y, EYE_W, mood === "alert" ? EYE_H_WIDE : EYE_H);
      return `<g class="cursor-mascot-eyes">
        ${wrapEye(left.x, left.y, draw(left))}
        ${wrapEye(right.x, right.y, draw(right))}
      </g>`;
    }

    function star(cls, fill) {
      return `<polygon class="${cls}" points="0,-6 1.6,-1.6 6,0 1.6,1.6 0,6 -1.6,1.6 -6,0 -1.6,-1.6" fill="${fill}"/>`;
    }

    function extras(mood, p) {
      if (mood === "alert") {
        return `<g class="cursor-mascot-bang">
          <rect x="53" y="-30" width="6" height="14" rx="1.5" fill="#f8dda0"/>
          <rect x="53" y="-13" width="6" height="5" rx="1.5" fill="#f8dda0"/>
        </g>`;
      }
      if (mood === "happy") {
        return `
          <path class="cursor-mascot-heart" d="M56 -14 C 51 -22 41 -17 56 -4 C 71 -17 61 -22 56 -14 Z" fill="${p.sparkle}"/>
          <g transform="translate(-6 12)">${star("cursor-mascot-star cursor-mascot-star-0", p.sparkle)}</g>
          <g transform="translate(118 6)">${star("cursor-mascot-star cursor-mascot-star-1", p.sparkle)}</g>
          <g transform="translate(96 -24)">${star("cursor-mascot-star cursor-mascot-star-2", p.sparkle)}</g>`;
      }
      if (mood === "sleeping") {
        return `<g class="cursor-mascot-zzz" fill="#aab4ff" font-family="ui-monospace,monospace" font-weight="700">
          <text class="cursor-mascot-z cursor-mascot-z-0" x="104" y="-6" font-size="16">z</text>
          <text class="cursor-mascot-z cursor-mascot-z-1" x="116" y="-16" font-size="20">z</text>
          <text class="cursor-mascot-z cursor-mascot-z-2" x="128" y="-28" font-size="24">z</text>
        </g>`;
      }
      if (mood === "worried") {
        return `<g transform="translate(108 -4)"><path class="cursor-mascot-sweat" d="M4 0 C 8 7 0 7 4 0 Z" fill="${p.sweat}"/></g>`;
      }
      return "";
    }

    function renderMascot(mood, size, blinking) {
      const p = paletteFor(mood);
      const w = size * ASPECT;
      return `
        <span class="cursor-mascot is-${mood}" style="width:${w}px;height:${size}px;--glow-inner:${p.glowInner};--glow-outer:${p.glowOuter}">
          <svg class="cursor-mascot-svg" width="100%" height="100%" viewBox="${VIEWBOX.x} ${VIEWBOX.y} ${VIEWBOX.w} ${VIEWBOX.h}" preserveAspectRatio="xMidYMid meet">
            <g class="cursor-mascot-figure" transform="${CUBE_TRANSFORM}">
              <ellipse cx="60" cy="78" rx="30" ry="4.5" fill="rgba(0,0,0,0.22)"/>
              <g class="cursor-mascot-cube" shape-rendering="crispEdges">${face(p)}</g>
              ${renderExpression(mood, blinking)}
              ${extras(mood, p)}
            </g>
          </svg>
        </span>`;
    }

    function mount(el, mood, size) {
      el.innerHTML = renderMascot(mood, size, false);
      if (mood !== "sleeping" && mood !== "dead") {
        const loop = () => {
          el.innerHTML = renderMascot(mood, size, true);
          setTimeout(() => {
            el.innerHTML = renderMascot(mood, size, false);
          }, 150);
          setTimeout(loop, 3000 + Math.random() * 2500);
        };
        setTimeout(loop, 2500 + Math.random() * 2500);
      }
    }

    const hero = document.getElementById("hero");
    mount(hero, "calm", 168);

    const grid = document.getElementById("grid");
    for (const { mood, hint } of MOODS) {
      const card = document.createElement("article");
      card.className = "card";
      const stage = document.createElement("div");
      stage.className = "card-stage";
      card.appendChild(stage);
      const label = document.createElement("p");
      label.className = "card-label";
      label.textContent = mood;
      card.appendChild(label);
      const hintEl = document.createElement("p");
      hintEl.className = "card-hint";
      hintEl.textContent = hint;
      card.appendChild(hintEl);
      grid.appendChild(card);
      mount(stage, mood, 120);
    }
  </script>
</body>
</html>
