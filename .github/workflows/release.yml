name: Release

# 推送 v* tag 时自动构建并发布到 GitHub Releases。
# 版本号从 tag 注入，无需手动改 package.json / tauri.conf.json / Cargo.toml。
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (arm64)
    # Intel (x86_64) build 暂未启用：GitHub 免费 Intel runner 排队严重，
    # 且 Intel Mac 占比已很低。需要时改成 matrix 加回 macos-13 即可。

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building release ${VERSION}"

      - name: Sync version files
        run: bash scripts/sync-version.sh "${{ steps.version.outputs.value }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-14-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: macos-14-cargo-

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build --target aarch64-apple-darwin

      - name: Ad-hoc sign .app
        run: |
          APP="src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Atoll.app"
          codesign --force --deep --sign - "$APP"
          codesign --verify --strict "$APP" && echo "ad-hoc sign OK"

      - name: Stage macOS artifacts
        run: |
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          DMG=$(ls "$BUNDLE_DIR/dmg/"*.dmg | head -1)
          test -f "$DMG" || { echo "dmg not found"; exit 1; }

          mkdir -p staging
          cp "$DMG" "staging/Atoll-aarch64.dmg"
          cd staging
          shasum -a 256 "Atoll-aarch64.dmg" | awk '{print $1}' > "Atoll-aarch64.dmg.sha256"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: staging/

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building Windows release ${VERSION}"

      - name: Sync version files
        shell: bash
        run: bash scripts/sync-version.sh "${{ steps.version.outputs.value }}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: windows-latest-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: windows-latest-cargo-

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri -- build --bundles msi

      - name: Stage Windows artifacts
        shell: bash
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          echo "Bundle contents:"
          ls -la "$BUNDLE_DIR" || true
          ls -la "$BUNDLE_DIR/msi/" || true
          MSI=$(ls "$BUNDLE_DIR/msi/"*.msi | head -1)
          test -f "$MSI" || { echo "msi not found"; exit 1; }

          mkdir -p staging
          cp "$MSI" "staging/Atoll-x64.msi"
          cd staging
          sha256sum "Atoll-x64.msi" | awk '{print $1}' > "Atoll-x64.msi.sha256"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: staging/

  publish-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: macos-staging

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: windows-staging

      - name: Stage release files
        run: |
          mkdir -p release
          cp macos-staging/* release/
          cp windows-staging/* release/
          cp scripts/install.sh release/install.sh
          cp scripts/install.ps1 release/install.ps1
          cp scripts/install.cmd release/install.cmd
          chmod +x release/install.sh

          cat > release/Fix-Atoll.command <<'EOF'
          #!/bin/bash
          set -e
          APP_PATH="/Applications/Atoll.app"
          if [ ! -d "$APP_PATH" ]; then
            osascript -e 'display dialog "请先把 Atoll 拖到「应用程序」文件夹，再运行本脚本。" with title "Atoll 安装修复" buttons {"好"} default button 1' >/dev/null
            exit 1
          fi
          echo "正在修复 Atoll（需要输入开机密码）..."
          sudo xattr -cr "$APP_PATH"
          osascript -e 'display dialog "完成！现在可以打开 Atoll 了。" with title "Atoll 安装修复" buttons {"好"} default button 1' >/dev/null
          EOF
          chmod +x release/Fix-Atoll.command

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: scripts/release-notes/${{ steps.version.outputs.tag }}.md
          files: |
            release/Atoll-aarch64.dmg
            release/Atoll-aarch64.dmg.sha256
            release/Atoll-x64.msi
            release/Atoll-x64.msi.sha256
            release/install.sh
            release/install.ps1
            release/install.cmd
            release/Fix-Atoll.command
